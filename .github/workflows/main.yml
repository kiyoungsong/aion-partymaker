# .github/workflows/deploy.yml
name: Deploy to Publish

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - run: yarn install
      - run: yarn build

      - name: Push to publish repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        with:
          source-directory: dist
          destination-github-username: aion-partymaker
          destination-repository-name: aion-partymaker.github.io
          target-branch: main
